name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          export THEOS=/opt/theos
          sudo mkdir -p /opt/theos
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=/opt/theos
          export PATH=$PATH:/opt/theos/bin
          # البحث عن ملف Makefile والبناء في مكانه
          find . -name "Makefile" -execdir make package \;
          # جمع المخرجات في مجلد ثابت
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
