name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # نحدد مساراً محلياً للمشروع لا يتعارض مع ملفات النظام
          export THEOS=$HOME/theos
          
          # التحقق من وجود المجلد قبل التحميل (لتجنب خطأ 128)
          if [ ! -d "$THEOS" ]; then
            git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          fi
          if [ ! -d "$THEOS/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=$HOME/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء: يبحث عن ملف Makefile في أي مكان ويقوم بالبناء
          find . -name "Makefile" -execdir make package \;
          
          # تجميع المخرجات في مجلد ثابت للرفع
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
