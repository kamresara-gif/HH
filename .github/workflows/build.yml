name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ldid dpkg

      - name: Setup Environment
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          
          # التحقق من وجود Theos وتخطيه إذا كان موجوداً
          if [ ! -d "$THEOS" ]; then
            git clone --depth 1 https://github.com/theos/theos "$THEOS"
            cd "$THEOS" && git submodule update --init --recursive
          fi
          
          # التحقق من وجود SDKs
          if [ ! -d "$THEOS/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          export PATH=$PATH:$THEOS/bin
          
          # التأكد من المسار
          cd $GITHUB_WORKSPACE
          
          # البناء
          make package
          
          # جمع المخرجات
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
