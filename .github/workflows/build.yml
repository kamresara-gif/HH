name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean and Setup
        run: |
          # مسح أي مسار قديم تماماً
          rm -rf theos_dir
          
          # إنشاء المجلد من جديد
          mkdir theos_dir
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          
          # تحميل Theos بدون التعقيدات التي تسبب الخطأ 128
          git clone --depth 1 https://github.com/theos/theos "$THEOS"
          
          # تحميل الـ SDKs داخل مجلد نظيف
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          
          # تحديث الـ submodules فقط للمجلد الرئيسي
          cd "$THEOS" && git submodule update --init --recursive
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          export PATH=$PATH:$THEOS/bin
          
          # البناء
          make package
          
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
