name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # مسح أي بقايا سابقة لضمان بيئة نظيفة تماماً
          rm -rf $HOME/theos
          
          # نستخدم مسار $HOME/theos الذي يملكه المستخدم
          export THEOS=$HOME/theos
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          # التأكد من استخدام المسار الموحد
          export THEOS=$HOME/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء
          make package
          
          # نقل الناتج إلى مجلد ثابت
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
