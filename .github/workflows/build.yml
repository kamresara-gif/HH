name: Tweak Cloud Compiler
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          # تنظيف أي مجلدات قديمة تسبب الخطأ 128
          rm -rf theos sdks
          # تحميل Theos مباشرة إلى مجلد المشروع
          git clone --depth 1 https://github.com/theos/theos.git theos
          git clone --depth 1 https://github.com/theos/sdks.git theos/sdks
          
          # تثبيت الأدوات الضرورية
          sudo apt-get update && sudo apt-get install -y dpkg

      - name: Compile
        run: |
          # تصدير المسارات لتشير إلى المجلدات داخل المشروع الحالي
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء (نستخدم make فقط أولاً للتأكد من التجميع)
          make
          # إذا نجح make، سيقوم هذا الأمر بإنشاء الحزمة
          make package
          
          # تجميع الناتج
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
