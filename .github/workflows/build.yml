name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Essential Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make git dpkg

      - name: Setup Theos
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          # تنظيف أي بقايا لضمان عدم حدوث خطأ 128
          rm -rf "$THEOS"
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          export PATH=$PATH:$THEOS/bin
          # محاولة البناء الأساسية
          make
          # محاولة التغليف، إذا فشلت سنستخدم dpkg-deb مباشرة
          make package || dpkg-deb -b . ./SilentPwn.deb
          
          mkdir -p final_output
          cp *.deb final_output/ || echo "No deb file found"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
