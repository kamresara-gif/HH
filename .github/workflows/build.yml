name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # تنظيف بيئة العمل بالكامل من أي بقايا
          find . -maxdepth 1 -not -name '.' -not -name '.git' -exec rm -rf {} +
          
          # تثبيت الأدوات الضرورية
          sudo apt-get update && sudo apt-get install -y make git dpkg
          
          # تحميل Theos في مجلد ثابت وبسيط
          export THEOS=$HOME/theos
          rm -rf $THEOS
          git clone --recursive --depth 1 https://github.com/theos/theos $THEOS
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks
          
          # إعداد المسارات
          export PATH=$PATH:$THEOS/bin
          
          # العودة لمجلد العمل الأساسي (الذي يحتوي على الكود الخاص بك)
          # ملاحظة: إذا كان كودك في مجلد فرعي، تأكد من الدخول إليه هنا
          # cd اسم_المجلد_الخاص_بك
          
          # البناء
          make package
          
          # نقل الناتج
          mkdir -p final_output
          cp *.deb final_output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
