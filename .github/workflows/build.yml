name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # نستخدم مسار خاص داخل المجلد الرئيسي لضمان عدم تعارض مسارات النظام
          export THEOS=$GITHUB_WORKSPACE/theos
          
          # التحقق من وجود المجلد قبل تحميله لتجنب خطأ 128
          if [ ! -d "$THEOS" ]; then
            git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          fi
          
          if [ ! -d "$THEOS/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء باستخدام المسار الذي حددناه
          # هذا السطر يبحث عن Makefile في أي مجلد فرعي ويقوم بالبناء فيه
          find . -name "Makefile" -execdir make package \;
          
          # جمع ملفات الـ deb الناتجة (في أي مسار كانت)
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
