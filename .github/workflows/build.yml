name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean and Setup
        run: |
          # ننشئ مجلداً باسم فريد في كل مرة بناءً على الوقت الحالي
          TIMESTAMP=$(date +%s)
          export THEOS=$GITHUB_WORKSPACE/theos_$TIMESTAMP
          
          echo "Setting up Theos in $THEOS"
          
          # تحميل Theos و SDKs في مجلد جديد تماماً وغير مكرر
          git clone --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          
          # تحديث الـ submodules
          cd "$THEOS" && git submodule update --init --recursive
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile Tweak
        run: |
          # استخدام نفس المتغير الذي تم تصديره للبيئة
          export PATH=$PATH:$THEOS/bin
          
          # البناء
          make package
          
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
