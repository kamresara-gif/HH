name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg git make curl
          # تحميل ldid يدوياً لتجاوز مشكلة عدم توفره في المستودع
          sudo curl -sLo /usr/bin/ldid https://github.com/theos/ldid/releases/latest/download/ldid
          sudo chmod +x /usr/bin/ldid

      - name: Prepare Environment
        run: |
          # تنظيف أي مجلدات قديمة تسبب تعارضات
          rm -rf theos sdks
          
          # تحميل Theos و SDKs بشكل مباشر
          git clone --depth 1 https://github.com/theos/theos.git theos
          git clone --depth 1 https://github.com/theos/sdks.git theos/sdks

      - name: Compile
        run: |
          # ضبط متغيرات البيئة
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          
          # بناء الحزمة
          make package
          
          # تجميع المخرجات
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
