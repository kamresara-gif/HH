name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/theos/theos:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          # بما أننا نستخدم حاوية Theos جاهزة، كل الأدوات موجودة مسبقاً
          # هذا الأمر يقوم بالبناء مباشرة
          make package
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: packages/*.deb
