name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # نستخدم مساراً عشوائياً تماماً لا يمكن أن يكون موجوداً مسبقاً
          BUILD_DIR=$(mktemp -d)
          echo "Building in $BUILD_DIR"
          
          # تثبيت الأدوات
          sudo apt-get update && sudo apt-get install -y dpkg make
          sudo curl -sLo /usr/bin/ldid https://github.com/theos/ldid/releases/latest/download/ldid
          sudo chmod +x /usr/bin/ldid
          
          # تحميل الـ Theos داخل المسار العشوائي
          git clone --depth 1 https://github.com/theos/theos.git "$BUILD_DIR/theos"
          git clone --depth 1 https://github.com/theos/sdks.git "$BUILD_DIR/theos/sdks"
          
          # نسخ ملفات مشروعك الخاصة إلى داخل المسار الذي سنبني فيه
          cp -r . "$BUILD_DIR/project"
          cd "$BUILD_DIR/project"
          
          # ضبط الـ Theos للبناء
          export THEOS="$BUILD_DIR/theos"
          export PATH="$PATH:$THEOS/bin"
          
          # البناء
          make package
          
          # نقل الناتج إلى المجلد الأصلي ليتم رفعه
          mkdir -p $GITHUB_WORKSPACE/final_output
          cp *.deb $GITHUB_WORKSPACE/final_output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
