name: Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          # الدخول للمجلد الذي يحتوي على الكود
          cd SilentPwn-main
          # البناء بدون تنظيف لتجنب أخطاء clean
          make package
          # نسخ الملف الناتج لمجلد packages
          mkdir -p ../packages
          cp packages/*.deb ../packages/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: packages/*.deb
