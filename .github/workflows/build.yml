name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # نستخدم مسار $HOME/theos لأنه مساحة خاصة للمستخدم
          export THEOS=$HOME/theos
          
          # التحقق من وجود المجلد: إذا كان موجوداً، لا تفعل شيئاً (تخطي التحميل)
          if [ -d "$THEOS" ]; then
            echo "Theos already exists, skipping download."
          else
            echo "Theos not found, downloading..."
            git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=$HOME/theos
          export PATH=$PATH:$THEOS/bin
          
          # محاولة البناء
          make package
          
          # تجميع الناتج
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
