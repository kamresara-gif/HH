name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # استخدام مسار داخل مجلد المشروع الحالي لضمان عدم التعارض
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          
          echo "Setting up Theos in $THEOS"
          
          # تحميل Theos و SDKs في المجلد الجديد
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          
          # تصدير المتغيرات للخطوات التالية
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          # تأكد أننا نستخدم المسار الجديد
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          export PATH=$PATH:$THEOS/bin
          
          make package
          
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
