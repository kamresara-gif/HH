name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # تحديد المسار في مجلد العمل الحالي
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          
          # 1. التحقق من وجود مجلد Theos
          if [ -d "$THEOS" ]; then
            echo "Theos already exists. Skipping clone."
          else
            echo "Theos not found. Downloading..."
            git clone --depth 1 https://github.com/theos/theos "$THEOS"
            # تحديث الـ submodules فقط إذا لم تكن موجودة
            cd "$THEOS"
            git submodule update --init --recursive
          fi
          
          # 2. التحقق من وجود مجلد SDKs
          if [ -d "$THEOS/sdks" ]; then
            echo "SDKs already exist. Skipping clone."
          else
            echo "SDKs not found. Downloading..."
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          # تصدير المتغيرات للخطوات التالية
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          # التأكد من تصدير المسارات مرة أخرى في هذه الخطوة
          export THEOS=$GITHUB_WORKSPACE/theos_dir
          export PATH=$PATH:$THEOS/bin
          
          make package
          
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
