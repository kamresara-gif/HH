name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean and Prepare
        run: |
          # مسح أي ملفات قديمة تسبب خطأ 128
          rm -rf theos sdks
          
          # تحميل Theos و SDKs بشكل مباشر
          git clone --depth 1 https://github.com/theos/theos.git theos
          git clone --depth 1 https://github.com/theos/sdks.git theos/sdks
          
          # تثبيت الأدوات الضرورية (تم حل مشكلة ldid هنا)
          sudo apt-get update && sudo apt-get install -y dpkg make
          sudo curl -sLo /usr/bin/ldid https://github.com/theos/ldid/releases/latest/download/ldid
          sudo chmod +x /usr/bin/ldid

      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء
          make package
          
          # تجميع المخرجات
          mkdir -p final_output
          cp *.deb final_output/ || echo "No .deb generated"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
