name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # 1. تنظيف شامل لمجلد العمل
          rm -rf theos sdks
          
          # 2. تحميل Theos مباشرة كأرشيف (لا يحتاج git)
          echo "Downloading Theos..."
          curl -LO https://github.com/theos/theos/archive/master.tar.gz
          mkdir -p theos
          tar -xzf master.tar.gz -C theos --strip-components=1
          
          # 3. تحميل SDKs مباشرة كأرشيف
          echo "Downloading SDKs..."
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          mkdir -p theos/sdks
          tar -xzf master.tar.gz -C theos/sdks --strip-components=1
          
          # 4. تثبيت الأدوات الضرورية
          sudo apt-get update && sudo apt-get install -y make dpkg
          
          # 5. إعداد المسارات
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          
          # 6. البناء
          echo "Building..."
          make package
          
          # 7. التجميع
          mkdir -p final_output
          cp *.deb final_output/ || echo "No .deb generated"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
