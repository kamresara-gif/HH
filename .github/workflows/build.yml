name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # تحديد مسارات ثابتة
          export THEOS=$HOME/theos
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Compile
        run: |
          # تصدير المسارات للبيئة الحالية قبل البناء
          export THEOS=$HOME/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء باستخدام المسار الذي حددناه
          make package THEOS=$THEOS THEOS_MAKE_PATH=$THEOS/makefiles
          
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
          if-no-files-found: error
