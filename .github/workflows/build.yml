name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          # 1. التنظيف الجبري: حذف أي مجلدات قديمة تسبب تعارضات
          rm -rf theos sdks
          
          # 2. تحميل Theos و SDKs بشكل مباشر (بدون --recursive لتجنب تعارض الـ submodules)
          git clone --depth 1 https://github.com/theos/theos.git theos
          git clone --depth 1 https://github.com/theos/sdks.git theos/sdks
          
          # 3. تثبيت الأدوات الأساسية (ldid و dpkg)
          sudo apt-get update && sudo apt-get install -y dpkg ldid

      - name: Compile
        run: |
          # ضبط متغيرات البيئة بدقة
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          
          # التأكد من التواجد في المجلد الصحيح وبناء الحزمة
          # إذا كان الـ Makefile في المجلد الرئيسي، فلا حاجة للـ cd
          make package
          
          # تجميع المخرجات في مجلد ثابت
          mkdir -p final_output
          cp *.deb final_output/ || echo "No .deb file found"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
