name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # نحدد مسار ثابت وموحد للـ Theos
          export THEOS=$HOME/theos
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          
          # نضيف المسارات للبيئة
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          # نستخدم المسار الموحد
          export THEOS=$HOME/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء المباشر
          make package
          
          # نقل المخرجات إلى مجلد ثابت
          mkdir -p packages
          find . -name "*.deb" -exec cp {} packages/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: packages/
          if-no-files-found: error
