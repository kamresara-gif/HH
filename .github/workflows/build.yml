name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # تنظيف أي شيء قديم
          rm -rf /tmp/theos /tmp/build
          
          # تحميل Theos كأرشيف مباشر (تخطي git clone تماماً)
          mkdir -p /tmp/theos
          curl -L https://github.com/theos/theos/archive/master.tar.gz | tar -xz -C /tmp/theos --strip-components=1
          
          # تحميل SDKs كأرشيف مباشر
          mkdir -p /tmp/theos/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C /tmp/theos/sdks --strip-components=1
          
          # ضبط البيئة
          export THEOS=/tmp/theos
          export PATH=$PATH:$THEOS/bin
          
          # البناء
          make package
          
          # نقل المخرجات
          mkdir -p final_output
          cp *.deb final_output/ || echo "No .deb file found"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
