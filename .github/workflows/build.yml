name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # 1. إعداد مسار عمل بعيد عن مجلدات GitHub المخبأة
          export MY_WORKING_DIR=/tmp/build_dir
          rm -rf $MY_WORKING_DIR
          mkdir -p $MY_WORKING_DIR
          
          # 2. نقل ملفات الكود إلى هذا المجلد الجديد
          cp -r . $MY_WORKING_DIR/
          cd $MY_WORKING_DIR
          
          # 3. إعداد Theos في مسار خارجي آمن
          export THEOS=/tmp/theos
          rm -rf $THEOS
          git clone --recursive --depth 1 https://github.com/theos/theos $THEOS
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks
          
          # 4. إعداد البيئة
          export PATH=$PATH:$THEOS/bin
          
          # 5. البناء
          make package
          
          # 6. نقل المخرجات للمجلد الأصلي لكي يجدها الـ Artifact
          mkdir -p $GITHUB_WORKSPACE/final_output
          cp *.deb $GITHUB_WORKSPACE/final_output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
