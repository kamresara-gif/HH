name: Tweak Cloud Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # 1. إعداد مسار ثابت خارج مجلد العمل الخاص بـ GitHub
          export THEOS=/tmp/theos
          
          # 2. تحميل Theos فقط إذا لم يكن موجوداً، واستخدم --depth 1 لتقليل التعقيد
          if [ ! -d "$THEOS" ]; then
            git clone --depth 1 https://github.com/theos/theos.git "$THEOS"
          fi
          
          # 3. إعداد SDKs في مكان منفصل
          export THEOS_SDK_DIR=/tmp/sdks
          if [ ! -d "$THEOS_SDK_DIR" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS_SDK_DIR"
          fi
          
          # 4. ربط الـ SDKs بالـ Theos (بدلاً من الاستنساخ داخل المجلد)
          ln -s "$THEOS_SDK_DIR" "$THEOS/sdks"
          
          # 5. تثبيت الحزم المطلوبة
          sudo apt-get update && sudo apt-get install -y dpkg ldid make
          
          # 6. البناء
          export PATH=$PATH:$THEOS/bin
          make package
          
          # 7. التجميع
          mkdir -p final_output
          find . -name "*.deb" -exec cp {} final_output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: final_output/
